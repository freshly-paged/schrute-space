name: Fix GitHub Issues with Claude Code

on:
  workflow_dispatch:
    inputs:
      issue_numbers:
        description: "Comma-separated issue numbers to fix (e.g. 20,21,36)"
        required: true
        type: string

jobs:
  fix-issues:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install project dependencies
        run: npm ci

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@latest

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create fix branch
        id: branch
        run: |
          SORTED=$(echo "${{ inputs.issue_numbers }}" | tr ',' '\n' | sort -n | tr '\n' '-' | sed 's/-$//')
          BRANCH="fix/issues-${SORTED}"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT

      - name: Run Claude issue fixer
        id: fixer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBERS: ${{ inputs.issue_numbers }}
          REPO: ${{ github.repository }}
        run: node .github/scripts/fix-issues.mjs

      - name: Push branch
        run: git push origin "${{ steps.branch.outputs.name }}"

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "${{ steps.fixer.outputs.pr_title }}" \
            --body "${{ steps.fixer.outputs.pr_body }}" \
            --base main \
            --head "${{ steps.branch.outputs.name }}"
