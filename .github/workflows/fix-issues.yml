name: Fix GitHub Issues with Claude Code

on:
  # Manual: processes all open issues currently labelled 'claude-fix'
  workflow_dispatch:
    inputs:
      extra_instructions:
        description: "Optional extra instructions injected into Claude's prompt (e.g. 'Prefer early returns', 'Use Tailwind, not inline styles')"
        required: false
        type: string
        default: ""

jobs:
  fix-issues:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write   # needed to remove the 'claude-fix' label after fixing

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install project dependencies
        run: npm ci

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@latest

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve issue numbers
        id: issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NUMBERS=$(gh issue list --label "claude-fix" --state open --json number --jq '[.[].number] | join(",")')
          if [ -z "$NUMBERS" ]; then
            echo "No open issues labelled 'claude-fix' found."
            exit 1
          fi
          echo "numbers=$NUMBERS" >> $GITHUB_OUTPUT

      - name: Create fix branch
        id: branch
        run: |
          SORTED=$(echo "${{ steps.issues.outputs.numbers }}" | tr ',' '\n' | sort -n | tr '\n' '-' | sed 's/-$//')
          BRANCH="fix/issues-${SORTED}"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT

      - name: Run Claude issue fixer
        id: fixer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBERS: ${{ steps.issues.outputs.numbers }}
          EXTRA_INSTRUCTIONS: ${{ inputs.extra_instructions }}
          REPO: ${{ github.repository }}
        run: node .github/scripts/fix-issues.mjs

      - name: Push branch
        run: git push origin "${{ steps.branch.outputs.name }}"

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "${{ steps.fixer.outputs.pr_title }}" \
            --body "${{ steps.fixer.outputs.pr_body }}" \
            --base main \
            --head "${{ steps.branch.outputs.name }}"
