name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── 1. TypeScript type-checking ─────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npm run lint

  # ── 2. Unit tests ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ── 3. Production build check ────────────────────────────────────────────────
  build:
    name: Production build
    runs-on: ubuntu-latest
    env:
      # Vite injects GEMINI_API_KEY at build time (vite.config.ts).
      # A fake value is sufficient to verify the build succeeds.
      # TODO: Replace with ${{ secrets.GEMINI_API_KEY }} in a deploy workflow.
      GEMINI_API_KEY: fake-key-for-build-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Verify dist/index.html was produced
        run: test -f dist/index.html

