steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/schrute-space:$COMMIT_SHA', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/schrute-space:$COMMIT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - schrute-space
      - --image=gcr.io/$PROJECT_ID/schrute-space:$COMMIT_SHA
      - --region=us-central1
      - --allow-unauthenticated
      - --platform=managed
      - --update-annotations=run.googleapis.com/iap-enabled=false
      - --session-affinity
      - --cpu=2
      - --memory=1Gi
      - --no-cpu-throttling
      - --min-instances=1
      - --concurrency=50
      - --timeout=3600
      - --use-http2

images:
  - 'gcr.io/$PROJECT_ID/schrute-space:$COMMIT_SHA'
